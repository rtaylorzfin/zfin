[global]
# Repository location (inside container, mapped to host volume)
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-diff=7

# Compression — lz4 is fastest, zstd is good balance of speed/ratio
compress-type=lz4
compress-level=1

# Parallelism — adjust based on available cores
process-max=4

# Logging
log-level-console=info
log-level-file=detail

[zfindb]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-user=postgres
